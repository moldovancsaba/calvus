<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calvus - Project Hub</title>
    <style>
      :root {
        --bg: #f7f7f7;
        --surface: #ffffff;
        --text: #1e1e1e;
        --muted: #626262;
        --line: #e5e5e5;
        --accent: #111111;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { max-width: 960px; margin: 0 auto; padding: 48px 20px 80px; }
      h1 { margin: 0 0 10px; font-size: clamp(1.8rem, 3vw, 2.4rem); }
      .lead { margin: 0 0 28px; color: var(--muted); }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
      .card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 18px; }
      .card h2 { margin: 0 0 8px; font-size: 1.1rem; }
      .card p { margin: 0 0 14px; color: var(--muted); }
      .link {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--accent);
        color: #fff;
        background: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Calvus Project Hub</h1>
      <p class="lead">Client-facing wireframe projects managed in parallel.</p>
      <section class="grid">
        <article class="card">
          <h2>lexodont.hu</h2>
          <p>Dental company wireframe - draft v1 and next iterations.</p>
          <a class="link" href="./lexodont.hu/index.html">Open project</a>
        </article>
      </section>
    </main>
  </body>
</html>
